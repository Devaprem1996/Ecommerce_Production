<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>No Internet Connection - Aether Organic</title>
  <style>
    :root {
      --color-primary: #2D6A4F;
      --color-primary-dark: #1B4332;
      --color-neutral-bg: #F9FBF9;
      --color-card-bg: #FFFFFF;
      --color-text-main: #1F2937;
      --color-text-muted: #6B7280;
      --color-border: #E5E7EB;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-primary: #52B788;
        --color-primary-dark: #2D6A4F;
        --color-neutral-bg: #0A0F0D;
        --color-card-bg: #121915;
        --color-text-main: #F3F4F6;
        --color-text-muted: #9CA3AF;
        --color-border: #27332C;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--color-neutral-bg);
      color: var(--color-text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background-color 0.3s ease;
    }

    .card {
      background-color: var(--color-card-bg);
      border: 1px solid var(--color-border);
      border-radius: 16px;
      max-width: 420px;
      width: 100%;
      padding: 32px 24px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      text-align: center;
    }

    .logo-container {
      margin-bottom: 24px;
      color: var(--color-primary);
    }

    .icon-offline {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px auto;
      background-color: rgba(45, 106, 79, 0.08);
      color: var(--color-primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 10px;
      letter-spacing: -0.025em;
    }

    p {
      font-size: 13px;
      color: var(--color-text-muted);
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .btn-retry {
      display: inline-block;
      width: 100%;
      background-color: var(--color-primary);
      color: #FFFFFF !important;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: background-color 0.2s ease;
      box-shadow: 0 2px 4px rgba(45, 106, 79, 0.15);
      margin-bottom: 24px;
    }

    .btn-retry:hover {
      background-color: var(--color-primary-dark);
    }

    .info-box {
      background-color: var(--color-neutral-bg);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 16px;
      text-align: left;
    }

    .info-title {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-text-muted);
      margin-bottom: 8px;
    }

    .info-list {
      list-style-type: none;
      font-size: 12px;
      font-weight: 600;
      color: var(--color-text-main);
    }

    .info-list li {
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .info-list li::before {
      content: "•";
      color: var(--color-primary);
      font-weight: bold;
    }

    .info-list li:last-child {
      margin-bottom: 0;
    }
  </style>
</head>
<body>

  <div class="card">
    
    <!-- Brand Logo -->
    <div class="logo-container">
      <svg width="180" height="32" viewBox="0 0 180 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <text x="0" y="24" fill="currentColor" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="900" font-size="20" letter-spacing="1">Aether Organic<tspan fill="#F77F00">.</tspan></text>
      </svg>
    </div>

    <!-- Offline Icon -->
    <div class="icon-offline">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.5M5 12.5a10.94 10.94 0 0 1 5.83-2.84M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01" />
      </svg>
    </div>

    <!-- Message -->
    <h1>No Internet Connection</h1>
    <p>Looks like you're offline. Please check your network connection and try again.</p>

    <!-- Retry Button -->
    <button class="btn-retry" onclick="window.location.reload()">Retry Connection</button>

    <!-- Cache Pointers -->
    <div class="info-box">
      <div class="info-title">While you are offline</div>
      <ul class="info-list">
        <li>Pages you've visited before may still be readable</li>
        <li>Your cart and wishlist items are safely saved locally</li>
      </ul>
    </div>

  </div>

</body>
</html>
